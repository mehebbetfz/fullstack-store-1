<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: html(content=~{::main}, pageTitle='Каталог')}">
<head><title>Каталог</title></head>
<body>
<main>
<div class="container py-4">
    <div class="row">
        <!-- Sidebar filters -->
        <div class="col-lg-3 mb-4">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-dark text-white fw-semibold">
                    <i class="bi bi-funnel me-2"></i>Фильтры
                </div>
                <div class="card-body">
                    <form th:action="@{/products}" method="get" id="filterForm">
                        <div th:if="${search != null}">
                            <input type="hidden" name="search" th:value="${search}"/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold small">Категория</label>
                            <select name="category" class="form-select form-select-sm" onchange="this.form.submit()">
                                <option value="">Все категории</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.name()}"
                                        th:text="${cat.displayName}"
                                        th:selected="${selectedCategory != null and selectedCategory == cat.name()}">
                                </option>
                            </select>
                        </div>

                        

                        <div class="mb-3" th:if="${brands != null and !brands.isEmpty()}">
                            <label class="form-label fw-semibold small">Бренд</label>
                            <select name="brand" class="form-select form-select-sm">
                                <option value="">Все бренды</option>
                                <option th:each="b : ${brands}" th:value="${b}" th:text="${b}"
                                        th:selected="${param.brand != null and param.brand[0] == b}">
                                </option>
                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-sm">
                                <i class="bi bi-search me-1"></i>Применить
                            </button>
                            <a th:href="@{/products}" class="btn btn-outline-secondary btn-sm">
                                <i class="bi bi-x me-1"></i>Сбросить
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Products -->
        <div class="col-lg-9">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h4 class="fw-bold mb-0" th:if="${search != null}">
                        Результаты поиска: «<span th:text="${search}"></span>»
                    </h4>
                    <h4 class="fw-bold mb-0" th:if="${search == null}">Каталог товаров</h4>
                    <small class="text-muted" th:if="${products != null}">
                        Найдено: <span th:text="${products.totalElements}"></span> товаров
                    </small>
                </div>
                <div class="d-flex gap-2 align-items-center">
                    <label class="text-muted small me-1">Сортировка:</label>
                    <select class="form-select form-select-sm" style="width:auto"
                            onchange="location.href=this.value">
                        <option th:value="@{/products(sort=createdAt,dir=desc)}" th:selected="${sortField=='createdAt' and sortDir=='desc'}">Новинки</option>
                        <option th:value="@{/products(sort=price,dir=asc)}" th:selected="${sortField=='price' and sortDir=='asc'}">Цена ↑</option>
                        <option th:value="@{/products(sort=price,dir=desc)}" th:selected="${sortField=='price' and sortDir=='desc'}">Цена ↓</option>
                        <option th:value="@{/products(sort=name,dir=asc)}" th:selected="${sortField=='name' and sortDir=='asc'}">Название А-Я</option>
                    </select>
                </div>
            </div>

            <!-- Grid -->
            <div class="row g-3" th:if="${products != null and !products.isEmpty()}">
                <div class="col-sm-6 col-xl-4" th:each="product : ${products.content}">
                    <div class="card h-100 border-0 shadow-sm product-card">
                        <div class="product-img-wrap">
                            <a th:href="@{/products/{id}(id=${product.id})}">
                                <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://via.placeholder.com/300x200?text=' + product.name}"
                                     class="card-img-top product-img" th:alt="${product.name}"/>
                            </a>
                            <span class="badge bg-success position-absolute top-0 start-0 m-2 small" th:if="${product.stockQuantity > 0}">В наличии</span>
                            <span class="badge bg-danger position-absolute top-0 start-0 m-2 small" th:if="${product.stockQuantity == 0}">Нет в наличии</span>
                        </div>
                        <div class="card-body d-flex flex-column p-3">
                            <div class="text-muted small mb-1" th:text="${product.category?.displayName}"></div>
                            <a th:href="@{/products/{id}(id=${product.id})}" class="text-decoration-none text-dark">
                                <h6 class="card-title fw-semibold lh-sm" th:text="${product.name}"></h6>
                            </a>
                            <div class="text-muted small mb-2" th:if="${product.brand}" th:text="${product.brand}"></div>
                            <div class="mt-auto">
                                <div class="fw-bold text-primary fs-5 mb-2"
                                     th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT') + ' ₽'}"></div>
                                <div class="d-flex gap-2">
                                    <a th:href="@{/products/{id}(id=${product.id})}"
                                       class="btn btn-outline-secondary btn-sm flex-fill">Подробнее</a>
                                    <form th:action="@{/cart/add}" method="post" sec:authorize="isAuthenticated()">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <input type="hidden" name="productId" th:value="${product.id}"/>
                                        <button type="submit" class="btn btn-primary btn-sm"
                                                th:disabled="${product.stockQuantity == 0}"
                                                title="В корзину">
                                            <i class="bi bi-cart-plus"></i>
                                        </button>
                                    </form>
                                    <a th:href="@{/auth/login}" class="btn btn-primary btn-sm"
                                       sec:authorize="!isAuthenticated()" title="В корзину">
                                        <i class="bi bi-cart-plus"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Empty -->
            <div class="text-center py-5" th:if="${products == null or products.isEmpty()}">
                <i class="bi bi-search display-3 text-muted"></i>
                <h5 class="mt-3 text-muted">Товары не найдены</h5>
                <a th:href="@{/products}" class="btn btn-primary mt-3">Смотреть все</a>
            </div>

            <!-- Pagination -->
            <nav th:if="${products != null and products.totalPages > 1}" class="mt-4">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${products.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/products(page=${products.number - 1})}">«</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                        th:classappend="${i == products.number} ? 'active'">
                        <a class="page-link" th:href="@{/products(page=${i})}" th:text="${i + 1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${products.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/products(page=${products.number + 1})}">»</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
</main>
</body>
</html>
