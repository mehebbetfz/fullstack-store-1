<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: html(content=~{::main}, pageTitle=${product.name})}">
<head><title>Товар</title></head>
<body>
<main>
<div class="container py-4">
    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Главная</a></li>
            <li class="breadcrumb-item"><a th:href="@{/products}">Каталог</a></li>
            <li class="breadcrumb-item" th:if="${product.category}">
                <a th:href="@{/products(category=${product.category.name()})}" th:text="${product.category.displayName}"></a>
            </li>
            <li class="breadcrumb-item active" th:text="${product.name}"></li>
        </ol>
    </nav>

    <div class="row g-4">
        <!-- Image -->
        <div class="col-md-5">
            <div class="card border-0 shadow-sm p-3 text-center">
                <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://via.placeholder.com/500x400?text=' + product.name}"
                     class="img-fluid rounded" th:alt="${product.name}" style="max-height:400px; object-fit:contain;"/>
            </div>
        </div>

        <!-- Info -->
        <div class="col-md-7">
            <div class="badge bg-secondary mb-2" th:text="${product.category?.displayName}"></div>
            <h1 class="h2 fw-bold" th:text="${product.name}"></h1>
            <p class="text-muted" th:if="${product.brand}">
                <strong>Бренд:</strong> <span th:text="${product.brand}"></span>
                <span th:if="${product.model}"> | <strong>Модель:</strong> <span th:text="${product.model}"></span></span>
            </p>

            <div class="my-3">
                <span class="display-6 fw-bold text-primary"
                      th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT') + ' ₽'}"></span>
            </div>

            <div class="mb-3">
                <span class="badge bg-success fs-6" th:if="${product.stockQuantity > 5}">
                    <i class="bi bi-check-circle me-1"></i>В наличии
                </span>
                <span class="badge bg-warning text-dark fs-6" th:if="${product.stockQuantity > 0 and product.stockQuantity <= 5}">
                    <i class="bi bi-exclamation-circle me-1"></i>Осталось мало: <span th:text="${product.stockQuantity}"></span> шт.
                </span>
                <span class="badge bg-danger fs-6" th:if="${product.stockQuantity == 0}">
                    <i class="bi bi-x-circle me-1"></i>Нет в наличии
                </span>
            </div>

            <!-- Add to cart form -->
            <div sec:authorize="isAuthenticated()">
                <form th:action="@{/cart/add}" method="post" class="d-flex gap-3 align-items-center mb-3"
                      th:if="${product.stockQuantity > 0}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="productId" th:value="${product.id}"/>
                    <div class="input-group" style="width:130px">
                        <button type="button" class="btn btn-outline-secondary btn-sm" onclick="changeQty(-1)">−</button>
                        <input type="number" name="quantity" id="qtyInput" value="1" min="1"
                               th:max="${product.stockQuantity}" class="form-control text-center"/>
                        <button type="button" class="btn btn-outline-secondary btn-sm" onclick="changeQty(1)">+</button>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg px-4">
                        <i class="bi bi-cart-plus me-2"></i>В корзину
                    </button>
                </form>
            </div>
            <div sec:authorize="!isAuthenticated()" class="mb-3">
                <a th:href="@{/auth/login}" class="btn btn-primary btn-lg px-4">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Войти для покупки
                </a>
            </div>

            <!-- Description -->
            <div class="mt-4" th:if="${product.description}">
                <h5 class="fw-semibold">Описание</h5>
                <p th:text="${product.description}" class="text-muted"></p>
            </div>

            <div class="mt-3 p-3 bg-light rounded">
                <div class="row text-center g-3">
                    <div class="col-4">
                        <i class="bi bi-truck text-primary fs-4"></i>
                        <div class="small mt-1">Быстрая<br>доставка</div>
                    </div>
                    <div class="col-4">
                        <i class="bi bi-shield-check text-success fs-4"></i>
                        <div class="small mt-1">Официальная<br>гарантия</div>
                    </div>
                    <div class="col-4">
                        <i class="bi bi-arrow-return-left text-warning fs-4"></i>
                        <div class="small mt-1">Возврат<br>14 дней</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    function changeQty(delta) {
        const input = document.getElementById('qtyInput');
        const min = parseInt(input.min) || 1;
        const max = parseInt(input.max) || 999;
        input.value = Math.min(Math.max(parseInt(input.value) + delta, min), max);
    }
</script>
</main>
</body>
</html>
