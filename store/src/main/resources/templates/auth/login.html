<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::main}, pageTitle='Вход')}">
<head><title>Вход</title></head>
<body>
<main>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow border-0">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <i class="bi bi-cpu-fill fs-1 text-primary"></i>
                            <h3 class="fw-bold mt-2">Вход в TechShop</h3>
                            <p class="text-muted small">Войдите в свой аккаунт</p>
                        </div>

                        <form th:action="@{/auth/login}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Имя пользователя</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input type="text" name="username" class="form-control"
                                           placeholder="Введите имя пользователя" required autofocus/>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Пароль</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                    <input type="password" name="password" class="form-control"
                                           placeholder="Введите пароль" required/>
                                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword(this)">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="bi bi-box-arrow-in-right me-2"></i>Войти
                                </button>
                            </div>
                        </form>

                        <hr/>
                        <p class="text-center mb-0">
                            Нет аккаунта?
                            <a th:href="@{/auth/register}" class="text-primary fw-semibold">Зарегистрироваться</a>
                        </p>
                    </div>
                </div>

                <!-- Demo credentials -->
                <div class="card mt-3 border-warning">
                    <div class="card-body p-3 small">
                        <div class="fw-semibold text-warning"><i class="bi bi-info-circle me-1"></i>Тестовые данные</div>
                        <div class="mt-2"><strong>Пользователь:</strong> user / user123</div>
                        <div><strong>Администратор:</strong> admin / admin123</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function togglePassword(btn) {
            const input = btn.previousElementSibling;
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }
    </script>
</main>
</body>
</html>
