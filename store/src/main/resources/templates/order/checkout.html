<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::main}, pageTitle='Оформление заказа')}">
<head><title>Оформление заказа</title></head>
<body>
<main>
<div class="container py-4">
    <h2 class="fw-bold mb-4"><i class="bi bi-bag-check me-2"></i>Оформление заказа</h2>

    <div class="alert alert-danger" th:if="${error}">
        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
    </div>

    <div class="row g-4">
        <!-- Order form -->
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm">
                <div class="card-header fw-semibold bg-dark text-white">
                    <i class="bi bi-geo-alt me-2"></i>Данные для доставки
                </div>
                <div class="card-body">
                    <form th:action="@{/orders/checkout}" th:object="${orderDto}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Адрес доставки <span class="text-danger">*</span></label>
                            <textarea th:field="*{shippingAddress}"
                                      th:class="${#fields.hasErrors('shippingAddress')} ? 'form-control is-invalid' : 'form-control'"
                                      rows="3" placeholder="Город, улица, дом, квартира" required></textarea>
                            <div class="invalid-feedback" th:errors="*{shippingAddress}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Телефон <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                <input type="tel" th:field="*{phone}"
                                       th:class="${#fields.hasErrors('phone')} ? 'form-control is-invalid' : 'form-control'"
                                       placeholder="+7 (999) 000-00-00" required/>
                            </div>
                            <div class="invalid-feedback" th:errors="*{phone}"></div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Комментарий к заказу</label>
                            <textarea th:field="*{notes}" class="form-control" rows="2"
                                      placeholder="Дополнительная информация..."></textarea>
                        </div>
                        <div class="d-flex gap-3">
                            <a th:href="@{/cart}" class="btn btn-outline-secondary flex-fill">
                                <i class="bi bi-arrow-left me-2"></i>Назад
                            </a>
                            <button type="submit" class="btn btn-primary flex-fill btn-lg">
                                <i class="bi bi-check-circle me-2"></i>Подтвердить заказ
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Cart summary -->
        <div class="col-lg-5">
            <div class="card border-0 shadow-sm">
                <div class="card-header fw-semibold bg-dark text-white">
                    <i class="bi bi-cart3 me-2"></i>Ваш заказ
                </div>
                <div class="card-body p-0">
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item py-3" th:each="item : ${cart.items}">
                            <div class="d-flex gap-3 align-items-center">
                                <img th:src="${item.product.imageUrl != null ? item.product.imageUrl : 'https://via.placeholder.com/50'}"
                                     style="width:50px;height:50px;object-fit:cover" class="rounded"/>
                                <div class="flex-grow-1">
                                    <div class="fw-semibold small" th:text="${item.product.name}"></div>
                                    <div class="text-muted small">× <span th:text="${item.quantity}"></span></div>
                                </div>
                                <div class="fw-semibold text-primary small"
                                     th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT') + ' ₽'}"></div>
                            </div>
                        </li>
                    </ul>
                    <div class="p-3 border-top">
                        <div class="d-flex justify-content-between fw-bold fs-5">
                            <span>Итого:</span>
                            <span class="text-primary"
                                  th:text="${#numbers.formatDecimal(cart.totalPrice, 0, 'COMMA', 0, 'POINT') + ' ₽'}"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</main>
</body>
</html>
