<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::main}, pageTitle='Мои заказы')}">
<head><title>Мои заказы</title></head>
<body>
<main>
<div class="container py-4">
    <h2 class="fw-bold mb-4"><i class="bi bi-box-seam me-2"></i>Мои заказы</h2>

    <div th:if="${orders == null or orders.isEmpty()}" class="text-center py-5">
        <i class="bi bi-box display-2 text-muted"></i>
        <h4 class="mt-3 text-muted">Заказов пока нет</h4>
        <a th:href="@{/products}" class="btn btn-primary mt-3">Начать покупки</a>
    </div>

    <div class="row g-3" th:if="${orders != null and !orders.isEmpty()}">
        <div class="col-12" th:each="order : ${orders}">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <div class="row align-items-center">
                        <div class="col-md-2">
                            <div class="text-muted small">Заказ</div>
                            <div class="fw-bold fs-5">#<span th:text="${order.id}"></span></div>
                        </div>
                        <div class="col-md-2">
                            <div class="text-muted small">Дата</div>
                            <div class="small" th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy')}"></div>
                        </div>
                        <div class="col-md-3">
                            <div class="text-muted small">Статус</div>
                            <span th:text="${order.status.displayName}"
                                  th:class="${'badge ' + (order.status.name() == 'PENDING' ? 'bg-warning text-dark' :
                                            order.status.name() == 'CONFIRMED' ? 'bg-info text-dark' :
                                            order.status.name() == 'PROCESSING' ? 'bg-primary' :
                                            order.status.name() == 'SHIPPED' ? 'bg-secondary' :
                                            order.status.name() == 'DELIVERED' ? 'bg-success' : 'bg-danger')}"></span>
                        </div>
                        <div class="col-md-2">
                            <div class="text-muted small">Сумма</div>
                            <div class="fw-bold text-primary"
                                 th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT') + ' ₽'}"></div>
                        </div>
                        <div class="col-md-3 text-md-end mt-2 mt-md-0">
                            <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-outline-primary btn-sm">
                                Подробнее <i class="bi bi-arrow-right ms-1"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</main>
</body>
</html>
