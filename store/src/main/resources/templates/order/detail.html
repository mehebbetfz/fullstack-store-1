<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::main}, pageTitle=${'Заказ #' + order.id})}">
<head><title>Заказ</title></head>
<body>
<main>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0"><i class="bi bi-receipt me-2"></i>Заказ #<span th:text="${order.id}"></span></h2>
        <a th:href="@{/orders}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Мои заказы
        </a>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <!-- Items -->
            <div class="card border-0 shadow-sm mb-3">
                <div class="card-header fw-semibold bg-dark text-white">Товары в заказе</div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-3">Товар</th>
                                    <th class="text-center">Цена</th>
                                    <th class="text-center">Кол-во</th>
                                    <th class="text-center">Сумма</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${order.items}">
                                    <td class="ps-3">
                                        <div class="d-flex gap-3 align-items-center">
                                            <img th:src="${item.product.imageUrl != null ? item.product.imageUrl : 'https://via.placeholder.com/50'}"
                                                 style="width:50px;height:50px;object-fit:cover" class="rounded"/>
                                            <div>
                                                <div class="fw-semibold small" th:text="${item.product.name}"></div>
                                                <div class="text-muted small" th:text="${item.product.brand}"></div>
                                            </div>
                                        </div>
                                    </td>
                                    <td class="text-center small"
                                        th:text="${#numbers.formatDecimal(item.unitPrice, 0, 'COMMA', 0, 'POINT') + ' ₽'}"></td>
                                    <td class="text-center" th:text="${item.quantity}"></td>
                                    <td class="text-center fw-semibold text-primary"
                                        th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT') + ' ₽'}"></td>
                                </tr>
                            </tbody>
                            <tfoot class="table-light">
                                <tr>
                                    <th colspan="3" class="text-end ps-3">Итого:</th>
                                    <th class="text-center text-primary"
                                        th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT') + ' ₽'}"></th>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <!-- Order info -->
            <div class="card border-0 shadow-sm mb-3">
                <div class="card-header fw-semibold bg-dark text-white">Информация о заказе</div>
                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-5 text-muted small">Статус</dt>
                        <dd class="col-7">
                            <span th:text="${order.status.displayName}"
                                  th:class="${'badge ' + (order.status.name() == 'PENDING' ? 'bg-warning text-dark' :
                                            order.status.name() == 'CONFIRMED' ? 'bg-info text-dark' :
                                            order.status.name() == 'PROCESSING' ? 'bg-primary' :
                                            order.status.name() == 'SHIPPED' ? 'bg-secondary' :
                                            order.status.name() == 'DELIVERED' ? 'bg-success' : 'bg-danger')}"></span>
                        </dd>
                        <dt class="col-5 text-muted small">Дата</dt>
                        <dd class="col-7 small" th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}"></dd>
                        <dt class="col-5 text-muted small">Адрес</dt>
                        <dd class="col-7 small" th:text="${order.shippingAddress}"></dd>
                        <dt class="col-5 text-muted small">Телефон</dt>
                        <dd class="col-7 small" th:text="${order.phone}"></dd>
                        <dt class="col-5 text-muted small" th:if="${order.notes}">Комментарий</dt>
                        <dd class="col-7 small" th:if="${order.notes}" th:text="${order.notes}"></dd>
                    </dl>
                </div>
            </div>

            <!-- Cancel button -->
            <div th:if="${order.status.name() == 'PENDING'}">
                <form th:action="@{/orders/{id}/cancel(id=${order.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-outline-danger w-100"
                            onclick="return confirm('Отменить заказ?')">
                        <i class="bi bi-x-circle me-2"></i>Отменить заказ
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</main>
</body>
</html>
