<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::main}, pageTitle='Корзина')}">
<head><title>Корзина</title></head>
<body>
<main>
<div class="container py-4">
    <h2 class="fw-bold mb-4"><i class="bi bi-cart3 me-2"></i>Корзина</h2>

    <div th:if="${cart == null or cart.items.isEmpty()}" class="text-center py-5">
        <i class="bi bi-cart-x display-2 text-muted"></i>
        <h4 class="mt-3 text-muted">Корзина пуста</h4>
        <a th:href="@{/products}" class="btn btn-primary mt-3">
            <i class="bi bi-grid me-2"></i>Перейти в каталог
        </a>
    </div>

    <div th:if="${cart != null and !cart.items.isEmpty()}" class="row g-4">
        <!-- Items -->
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-3">Товар</th>
                                    <th class="text-center">Цена</th>
                                    <th class="text-center">Кол-во</th>
                                    <th class="text-center">Сумма</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${cart.items}">
                                    <td class="ps-3">
                                        <div class="d-flex align-items-center gap-3">
                                            <img th:src="${item.product.imageUrl != null ? item.product.imageUrl : 'https://via.placeholder.com/60x60'}"
                                                 style="width:60px;height:60px;object-fit:cover" class="rounded"/>
                                            <div>
                                                <a th:href="@{/products/{id}(id=${item.product.id})}"
                                                   th:text="${item.product.name}"
                                                   class="text-decoration-none text-dark fw-semibold small"></a>
                                                <div class="text-muted small" th:text="${item.product.brand}"></div>
                                            </div>
                                        </div>
                                    </td>
                                    <td class="text-center small"
                                        th:text="${#numbers.formatDecimal(item.product.price, 0, 'COMMA', 0, 'POINT') + ' ₽'}"></td>
                                    <td class="text-center">
                                        <form th:action="@{/cart/update}" method="post" class="d-flex gap-1 justify-content-center">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <input type="hidden" name="productId" th:value="${item.product.id}"/>
                                            <div class="input-group input-group-sm" style="width:110px">
                                                <button type="submit" name="quantity"
                                                        th:value="${item.quantity - 1}"
                                                        class="btn btn-outline-secondary">−</button>
                                                <input type="text" class="form-control text-center"
                                                       th:value="${item.quantity}" readonly style="max-width:40px"/>
                                                <button type="submit" name="quantity"
                                                        th:value="${item.quantity + 1}"
                                                        class="btn btn-outline-secondary">+</button>
                                            </div>
                                        </form>
                                    </td>
                                    <td class="text-center fw-semibold text-primary"
                                        th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT') + ' ₽'}"></td>
                                    <td class="text-center">
                                        <form th:action="@{/cart/remove}" method="post">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <input type="hidden" name="productId" th:value="${item.product.id}"/>
                                            <button type="submit" class="btn btn-outline-danger btn-sm">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="mt-3">
                <form th:action="@{/cart/clear}" method="post" class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-outline-danger btn-sm"
                            onclick="return confirm('Очистить корзину?')">
                        <i class="bi bi-trash me-1"></i>Очистить корзину
                    </button>
                </form>
                <a th:href="@{/products}" class="btn btn-outline-secondary btn-sm ms-2">
                    <i class="bi bi-arrow-left me-1"></i>Продолжить покупки
                </a>
            </div>
        </div>

        <!-- Summary -->
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-dark text-white fw-semibold">
                    <i class="bi bi-receipt me-2"></i>Итого
                </div>
                <div class="card-body">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Товаров:</span>
                        <span th:text="${cart.getTotalItems()}"></span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Доставка:</span>
                        <span class="text-success">Бесплатно</span>
                    </div>
                    <hr/>
                    <div class="d-flex justify-content-between mb-3 fw-bold fs-5">
                        <span>Итого:</span>
                        <span class="text-primary"
                              th:text="${#numbers.formatDecimal(cart.getTotalPrice(), 0, 'COMMA', 0, 'POINT') + ' ₽'}"></span>
                    </div>
                    <div class="d-grid">
                        <a th:href="@{/orders/checkout}" class="btn btn-primary btn-lg">
                            <i class="bi bi-bag-check me-2"></i>Оформить заказ
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</main>
</body>
</html>
