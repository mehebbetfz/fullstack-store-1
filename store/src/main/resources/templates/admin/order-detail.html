<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::main}, pageTitle=${'Заказ #' + order.id + ' (Админ)'})}">
<head><title>Заказ</title></head>
<body>
<main>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">Заказ #<span th:text="${order.id}"></span></h2>
        <a th:href="@{/admin/orders}" class="btn btn-outline-secondary btn-sm">← Все заказы</a>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header fw-semibold bg-dark text-white">Товары</div>
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-3">Товар</th>
                                <th class="text-center">Цена</th>
                                <th class="text-center">Кол-во</th>
                                <th class="text-center">Сумма</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${order.items}">
                                <td class="ps-3">
                                    <div class="fw-semibold small" th:text="${item.product.name}"></div>
                                    <div class="text-muted small" th:text="${item.product.brand}"></div>
                                </td>
                                <td class="text-center small" th:text="${#numbers.formatDecimal(item.unitPrice, 0, 'COMMA', 0, 'POINT') + ' ₽'}"></td>
                                <td class="text-center" th:text="${item.quantity}"></td>
                                <td class="text-center fw-semibold text-primary"
                                    th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT') + ' ₽'}"></td>
                            </tr>
                        </tbody>
                        <tfoot class="table-light">
                            <tr>
                                <th colspan="3" class="text-end ps-3">Итого:</th>
                                <th class="text-center text-primary"
                                    th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT') + ' ₽'}"></th>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card border-0 shadow-sm mb-3">
                <div class="card-header fw-semibold bg-dark text-white">Информация</div>
                <div class="card-body">
                    <dl class="row mb-0 small">
                        <dt class="col-5 text-muted">Клиент</dt>
                        <dd class="col-7" th:text="${order.user.username}"></dd>
                        <dt class="col-5 text-muted">Дата</dt>
                        <dd class="col-7" th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}"></dd>
                        <dt class="col-5 text-muted">Телефон</dt>
                        <dd class="col-7" th:text="${order.phone}"></dd>
                        <dt class="col-5 text-muted">Адрес</dt>
                        <dd class="col-7" th:text="${order.shippingAddress}"></dd>
                        <dt class="col-5 text-muted" th:if="${order.notes}">Комментарий</dt>
                        <dd class="col-7" th:if="${order.notes}" th:text="${order.notes}"></dd>
                    </dl>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-header fw-semibold bg-dark text-white">Изменить статус</div>
                <div class="card-body">
                    <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-3">
                            <select name="status" class="form-select">
                                <option th:each="s : ${statuses}"
                                        th:value="${s.name()}"
                                        th:text="${s.displayName}"
                                        th:selected="${s == order.status}"></option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-check me-2"></i>Обновить статус
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</main>
</body>
</html>
