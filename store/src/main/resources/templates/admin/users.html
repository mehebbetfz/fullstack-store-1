<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::main}, pageTitle='Пользователи')}">
<head><title>Пользователи</title></head>
<body>
<main>
<div class="container-fluid py-4">
    <h2 class="fw-bold mb-4"><i class="bi bi-people me-2"></i>Пользователи</h2>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th class="ps-3">ID</th>
                        <th>Пользователь</th>
                        <th>Email</th>
                        <th>Роль</th>
                        <th>Дата регистрации</th>
                        <th>Статус</th>
                        <th class="text-center">Действия</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td class="ps-3 text-muted small" th:text="${user.id}"></td>
                        <td>
                            <div class="fw-semibold" th:text="${user.username}"></div>
                            <div class="text-muted small" th:text="${user.firstName + ' ' + (user.lastName ?: '')}"></div>
                        </td>
                        <td class="small" th:text="${user.email}"></td>
                        <td>
                            <span th:text="${user.role}"
                                  th:class="${user.role.name() == 'ADMIN' ? 'badge bg-warning text-dark' : 'badge bg-secondary'}"></span>
                        </td>
                        <td class="small text-muted"
                            th:text="${#temporals.format(user.createdAt, 'dd.MM.yyyy')}"></td>
                        <td>
                            <span th:text="${user.enabled ? 'Активен' : 'Заблокирован'}"
                                  th:class="${user.enabled ? 'badge bg-success' : 'badge bg-danger'}"></span>
                        </td>
                        <td class="text-center">
                            <form th:action="@{/admin/users/{id}/toggle(id=${user.id})}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit"
                                        th:class="${user.enabled ? 'btn btn-outline-warning btn-sm' : 'btn btn-outline-success btn-sm'}"
                                        th:text="${user.enabled ? 'Заблокировать' : 'Разблокировать'}"
                                        th:disabled="${user.role.name() == 'ADMIN'}">
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</main>
</body>
</html>
