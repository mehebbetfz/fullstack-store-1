<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::main}, pageTitle='Управление товарами')}">
<head><title>Товары</title></head>
<body>
<main>
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0"><i class="bi bi-box-seam me-2"></i>Управление товарами</h2>
        <a th:href="@{/admin/products/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-2"></i>Добавить товар
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th class="ps-3">ID</th>
                        <th>Товар</th>
                        <th>Категория</th>
                        <th>Цена</th>
                        <th>Склад</th>
                        <th>Статус</th>
                        <th class="text-center">Действия</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${products.content}">
                        <td class="ps-3 text-muted small" th:text="${product.id}"></td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://via.placeholder.com/40'}"
                                     style="width:40px;height:40px;object-fit:cover" class="rounded"/>
                                <div>
                                    <div class="fw-semibold small" th:text="${product.name}"></div>
                                    <div class="text-muted" style="font-size:0.75rem" th:text="${product.brand}"></div>
                                </div>
                            </div>
                        </td>
                        <td class="small" th:text="${product.category?.displayName}"></td>
                        <td class="fw-semibold text-primary small"
                            th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT') + ' ₽'}"></td>
                        <td>
                            <span th:text="${product.stockQuantity}"
                                  th:class="${product.stockQuantity > 5 ? 'text-success fw-semibold' : product.stockQuantity > 0 ? 'text-warning fw-semibold' : 'text-danger fw-semibold'}"></span>
                        </td>
                        <td>
                            <span class="badge" th:classappend="${product.active ? 'bg-success' : 'bg-secondary'}"
                                  th:text="${product.active ? 'Активен' : 'Скрыт'}"></span>
                        </td>
                        <td class="text-center">
                            <div class="d-flex gap-1 justify-content-center">
                                <a th:href="@{/admin/products/{id}/edit(id=${product.id})}"
                                   class="btn btn-outline-primary btn-sm" title="Редактировать">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/admin/products/{id}/toggle(id=${product.id})}" method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm"
                                            th:classappend="${product.active ? 'btn-outline-warning' : 'btn-outline-success'}"
                                            th:title="${product.active ? 'Скрыть' : 'Показать'}">
                                        <i th:class="${product.active ? 'bi bi-eye-slash' : 'bi bi-eye'}"></i>
                                    </button>
                                </form>
                                <form th:action="@{/admin/products/{id}/delete(id=${product.id})}" method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-outline-danger btn-sm"
                                            onclick="return confirm('Удалить товар?')" title="Удалить">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination -->
    <nav th:if="${products.totalPages > 1}" class="mt-3">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${products.first} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/products(page=${products.number - 1})}">«</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                th:classappend="${i == products.number} ? 'active'">
                <a class="page-link" th:href="@{/admin/products(page=${i})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${products.last} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/products(page=${products.number + 1})}">»</a>
            </li>
        </ul>
    </nav>
</div>
</main>
</body>
</html>
