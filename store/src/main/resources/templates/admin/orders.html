<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::main}, pageTitle='Управление заказами')}">
<head><title>Заказы</title></head>
<body>
<main>
<div class="container-fluid py-4">
    <h2 class="fw-bold mb-4"><i class="bi bi-cart-check me-2"></i>Управление заказами</h2>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th class="ps-3">ID</th>
                        <th>Клиент</th>
                        <th>Дата</th>
                        <th>Адрес</th>
                        <th>Сумма</th>
                        <th>Статус</th>
                        <th class="text-center">Действия</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders.content}">
                        <td class="ps-3 fw-bold">#<span th:text="${order.id}"></span></td>
                        <td>
                            <div th:text="${order.user.username}"></div>
                            <div class="text-muted small" th:text="${order.phone}"></div>
                        </td>
                        <td class="small text-muted"
                            th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}"></td>
                        <td class="small" th:text="${#strings.abbreviate(order.shippingAddress, 40)}"></td>
                        <td class="fw-semibold text-primary"
                            th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT') + ' ₽'}"></td>
                        <td>
                            <span th:text="${order.status.displayName}"
                                  th:class="${'badge ' + (order.status.name() == 'PENDING' ? 'bg-warning text-dark' :
                                            order.status.name() == 'CONFIRMED' ? 'bg-info text-dark' :
                                            order.status.name() == 'PROCESSING' ? 'bg-primary' :
                                            order.status.name() == 'SHIPPED' ? 'bg-secondary' :
                                            order.status.name() == 'DELIVERED' ? 'bg-success' : 'bg-danger')}"></span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/admin/orders/{id}(id=${order.id})}"
                               class="btn btn-outline-primary btn-sm">Открыть →</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav th:if="${orders.totalPages > 1}" class="mt-3">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${orders.first} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/orders(page=${orders.number - 1})}">«</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, orders.totalPages - 1)}"
                th:classappend="${i == orders.number} ? 'active'">
                <a class="page-link" th:href="@{/admin/orders(page=${i})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${orders.last} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/orders(page=${orders.number + 1})}">»</a>
            </li>
        </ul>
    </nav>
</div>
</main>
</body>
</html>
