<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle != null ? pageTitle + ' | TechShop' : 'TechShop — Магазин техники'}">TechShop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" th:href="@{/}">
            <i class="bi bi-cpu-fill text-primary me-2"></i>TechShop
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}">
                        <i class="bi bi-grid me-1"></i>Каталог
                    </a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Категории</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" th:href="@{/products(category=LAPTOPS)}"><i class="bi bi-laptop me-2"></i>Ноутбуки</a></li>
                        <li><a class="dropdown-item" th:href="@{/products(category=SMARTPHONES)}"><i class="bi bi-phone me-2"></i>Смартфоны</a></li>
                        <li><a class="dropdown-item" th:href="@{/products(category=TABLETS)}"><i class="bi bi-tablet me-2"></i>Планшеты</a></li>
                        <li><a class="dropdown-item" th:href="@{/products(category=MONITORS)}"><i class="bi bi-display me-2"></i>Мониторы</a></li>
                        <li><a class="dropdown-item" th:href="@{/products(category=HEADPHONES)}"><i class="bi bi-headphones me-2"></i>Наушники</a></li>
                        <li><a class="dropdown-item" th:href="@{/products(category=CAMERAS)}"><i class="bi bi-camera me-2"></i>Камеры</a></li>
                        <li><hr class="dropdown-divider"/></li>
                        <li><a class="dropdown-item" th:href="@{/products}">Все товары</a></li>
                    </ul>
                </li>
            </ul>

            <!-- Search -->
            <form class="d-flex me-3" th:action="@{/products}" method="get">
                <input class="form-control form-control-sm me-2" type="search" name="search"
                       placeholder="Поиск товаров..." style="min-width:220px"/>
                <button class="btn btn-outline-primary btn-sm" type="submit">
                    <i class="bi bi-search"></i>
                </button>
            </form>

            <ul class="navbar-nav align-items-center">
                <!-- Cart -->
                <li class="nav-item me-2" sec:authorize="isAuthenticated()">
                    <a class="nav-link position-relative" th:href="@{/cart}">
                        <i class="bi bi-cart3 fs-5"></i>
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                              th:text="${cartCount != null && cartCount > 0 ? cartCount : ''}"
                              style="font-size:0.65rem"></span>
                    </a>
                </li>

                <!-- Auth -->
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name">Пользователь</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" th:href="@{/profile}"><i class="bi bi-person me-2"></i>Профиль</a></li>
                        <li><a class="dropdown-item" th:href="@{/orders}"><i class="bi bi-box-seam me-2"></i>Мои заказы</a></li>
                        <li sec:authorize="hasRole('ADMIN')"><hr class="dropdown-divider"/></li>
                        <li sec:authorize="hasRole('ADMIN')">
                            <a class="dropdown-item text-warning" th:href="@{/admin}">
                                <i class="bi bi-gear me-2"></i>Панель админа
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"/></li>
                        <li>
                            <form th:action="@{/auth/logout}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="bi bi-box-arrow-right me-2"></i>Выйти
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="btn btn-outline-light btn-sm me-2" th:href="@{/auth/login}">Войти</a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="btn btn-primary btn-sm" th:href="@{/auth/register}">Регистрация</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- FLASH MESSAGES -->
<div class="container mt-3" th:if="${success != null or error != null or message != null}">
    <div class="alert alert-success alert-dismissible fade show" th:if="${success}">
        <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="alert alert-danger alert-dismissible fade show" th:if="${error}">
        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="alert alert-info alert-dismissible fade show" th:if="${message}">
        <i class="bi bi-info-circle me-2"></i><span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<!-- PAGE CONTENT -->

    <main  th:replace="${content}">Main content</main>




<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
